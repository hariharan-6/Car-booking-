<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — AutoVault India</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .admin-login-box {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 24px; padding: 48px 40px; max-width: 420px; width: 100%;
      text-align: center; position: relative; z-index: 1;
      box-shadow: 0 0 60px rgba(124,58,237,0.15);
      animation: slideUp 0.4s ease;
    }
    .admin-badge {
      display: inline-block; background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.4); color: #a78bfa;
      padding: 6px 18px; border-radius: 100px; font-size: 0.78rem;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px;
    }
    .admin-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .admin-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .admin-sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }
    .btn-admin {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; font-weight: 700;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-admin:hover { box-shadow: 0 8px 30px rgba(124,58,237,0.6); }
    .back-link { display:block; margin-top:20px; color: var(--text-muted); font-size:0.85rem; text-decoration:none; }
    .back-link:hover { color: var(--accent); }
    .access-note {
      margin-top: 24px; font-size: 0.78rem; color: var(--text-muted);
      background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px 14px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow" style="background:rgba(124,58,237,0.1);width:500px;height:500px;top:-100px;left:-100px;position:fixed;border-radius:50%;filter:blur(100px)"></div>

  <div class="admin-login-box">
    <div class="admin-badge">🛡️ Admin Portal</div>
    <div class="admin-icon">⚙️</div>
    <h1 class="admin-title">Admin Access</h1>
    <p class="admin-sub">Sign in with your authorized admin Google account to access the AutoVault India management dashboard.</p>

    <button class="btn-primary btn-admin full-width" onclick="adminLogin()" id="adminLoginBtn">
      <img src="https://www.google.com/favicon.ico" width="18" alt="G"/>
      Sign in with Google
    </button>

    <div class="access-note">
      ⚠️ Only pre-authorized email addresses can access the admin panel. 
      Configure in <code>js/firebase-config.js</code> → ADMIN_EMAILS
    </div>

    <a href="../index.html" class="back-link">← Back to AutoVault India</a>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script>
    auth.onAuthStateChanged(user => {
      if (user && isAdmin(user.email)) window.location.href = "admin.html";
    });

    async function adminLogin() {
      const btn = document.getElementById("adminLoginBtn");
      btn.textContent = "Authenticating...";
      btn.disabled = true;
      try {
        const result = await auth.signInWithPopup(googleProvider);
        const user = result.user;
        if (!isAdmin(user.email)) {
          await auth.signOut();
          showToast("Access denied. Not an authorized admin.", "error");
          btn.innerHTML = `<img src="https://www.google.com/favicon.ico" width="18" alt="G"/> Sign in with Google`;
          btn.disabled = false;
          return;
        }
        showToast("Welcome, Admin! Redirecting...", "success");
        await db.collection("users").doc(user.uid).set({
          name: user.displayName, email: user.email,
          photo: user.photoURL, role: "admin",
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        setTimeout(() => window.location.href = "admin.html", 800);
      } catch (err) {
        showToast("Login error: " + err.message, "error");
        btn.innerHTML = `<img src="https://www.google.com/favicon.ico" width="18" alt="G"/> Sign in with Google`;
        btn.disabled = false;
      }
    }

    function showToast(msg, type="info") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = `toast toast-${type} show`;
      setTimeout(() => t.classList.remove("show"), 3500);
    }
  </script>
</body>
</html>
